<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Background -->
  <rect width="200" height="200" rx="10" fill="#0d0d0d"/>

  <!-- Flower of Life — 7 circles, pure solid orange, no faded rings -->
  <!-- Center -->
  <circle cx="100" cy="100" r="36" fill="none" stroke="#ff5c00" stroke-width="1.6"/>
  <!-- Top -->
  <circle cx="100" cy="64"  r="36" fill="none" stroke="#ff5c00" stroke-width="1.6"/>
  <!-- Top right -->
  <circle cx="131" cy="82"  r="36" fill="none" stroke="#ff5c00" stroke-width="1.6"/>
  <!-- Bottom right -->
  <circle cx="131" cy="118" r="36" fill="none" stroke="#ff5c00" stroke-width="1.6"/>
  <!-- Bottom -->
  <circle cx="100" cy="136" r="36" fill="none" stroke="#ff5c00" stroke-width="1.6"/>
  <!-- Bottom left -->
  <circle cx="69"  cy="118" r="36" fill="none" stroke="#ff5c00" stroke-width="1.6"/>
  <!-- Top left -->
  <circle cx="69"  cy="82"  r="36" fill="none" stroke="#ff5c00" stroke-width="1.6"/>
</svg>
