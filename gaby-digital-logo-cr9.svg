<svg xmlns="http://www.w3.org/2000/svg" viewBox="-5 -5 210 210" width="200" height="200">

  <!-- Range rings -->
  <circle cx="100" cy="100" r="68" fill="none" stroke="#F68220" stroke-width="2" opacity="0.5"/>
  <circle cx="100" cy="100" r="48" fill="none" stroke="#F68220" stroke-width="1.8" opacity="0.4"/>
  <circle cx="100" cy="100" r="28" fill="none" stroke="#F68220" stroke-width="1.5" opacity="0.3"/>

  <!-- G label north -->
  <text x="100" y="21" font-family="'Arial Black', sans-serif" font-size="13" fill="#F68220" text-anchor="middle" font-weight="900">G</text>

  <!-- North chevron V pointing up -->
  <line x1="100" y1="28" x2="100" y2="41" stroke="#F68220" stroke-width="2.5" stroke-linecap="round"/>
  <polyline points="76,85 100,45 124,85" fill="none" stroke="#F68220" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- South inverted V -->
  <polyline points="76,115 100,155 124,115" fill="none" stroke="#F68220" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.7"/>
  <line x1="100" y1="155" x2="100" y2="168" stroke="#F68220" stroke-width="2" stroke-linecap="round" opacity="0.7"/>

  <!-- D label south -->
  <text x="100" y="184" font-family="'Arial Black', sans-serif" font-size="13" fill="#F68220" text-anchor="middle" font-weight="900" opacity="0.7">D</text>

  <!-- E W arms -->
  <line x1="20"  y1="100" x2="38"  y2="100" stroke="#F68220" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="162" y1="100" x2="180" y2="100" stroke="#F68220" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Ordinal ticks NE NW SE SW -->
  <line x1="152" y1="37" x2="147" y2="42" stroke="#F68220" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  <line x1="48"  y1="37" x2="53"  y2="42" stroke="#F68220" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  <line x1="152" y1="163" x2="147" y2="158" stroke="#F68220" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
  <line x1="48"  y1="163" x2="53"  y2="158" stroke="#F68220" stroke-width="2" stroke-linecap="round" opacity="0.8"/>

  <!-- Center ring + dot -->
  <circle cx="100" cy="100" r="8" fill="none" stroke="#F68220" stroke-width="2"/>
  <circle cx="100" cy="100" r="3" fill="#F68220"/>
</svg>
