<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Message Sent — Gaby Digital</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Sora:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #000;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
      -webkit-font-smoothing: antialiased;
    }
    .icon {
      width: 72px;
      height: 72px;
      background: rgba(246,130,32,.12);
      border: 1.5px solid rgba(246,130,32,.3);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
    }
    .icon svg { width: 32px; height: 32px; color: #F68220; }
    h1 {
      font-family: 'Sora', sans-serif;
      font-size: clamp(1.8rem, 4vw, 2.6rem);
      font-weight: 800;
      margin-bottom: 16px;
    }
    p {
      font-size: 17px;
      color: #999;
      max-width: 420px;
      line-height: 1.7;
      margin-bottom: 36px;
    }
    a {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #F68220;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      padding: 14px 28px;
      border-radius: 50px;
      text-decoration: none;
      transition: background .2s, transform .2s;
    }
    a:hover { background: #DB6B04; transform: translateY(-2px); }
    .logo {
      position: fixed;
      top: 24px;
      left: 32px;
      font-family: 'Sora', sans-serif;
      font-size: 20px;
      font-weight: 800;
      text-decoration: none;
    }
    .logo-gaby { color: #fff; }
    .logo-digital { color: #F68220; }
  </style>
</head>
<body>
  <a href="https://jrgaby35-afk.github.io/Gaby.Digital/" class="logo">
    <span class="logo-gaby">Gaby</span><span class="logo-digital">Digital</span>
  </a>
  <div class="icon">
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.75"/>
      <path d="M7 12l4 4 6-6" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </div>
  <h1>Message received!</h1>
  <p>Thanks for reaching out. I'll review your project details and get back to you within 24 hours.</p>
  <a href="https://jrgaby35-afk.github.io/Gaby.Digital/">← Back to Gaby Digital</a>
</body>
</html>
